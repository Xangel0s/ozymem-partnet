version: '3.8'

services:
  memgraph:
    image: memgraph/memgraph:latest
    container_name: ozymem-memgraph
    restart: always
    ports:
      - "7687:7687"
    volumes:
      - memgraph-data:/var/lib/memgraph
    environment:
      - MEMGRAPH_USER=${MEMGRAPH_USER}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD}
    healthcheck:
      test: ["CMD", "mg_console", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    networks:
      - ozymem-network

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: ozymem-memgraph-lab
    restart: always
    depends_on:
      memgraph:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: 7687
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - ozymem-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozymem-server
    restart: always
    depends_on:
      memgraph:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - MEMGRAPH_URI=memgraph:7687
      - MEMGRAPH_USER=${MEMGRAPH_USER}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD}
      - MEMGRAPH_DATABASE=${MEMGRAPH_DATABASE:-memgraph}
      - PORT=8080
      - OZYMEM_SERVER_MODE=web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    networks:
      - ozymem-network

volumes:
  memgraph-data:
    driver: local

networks:
  ozymem-network:
    driver: bridge
    internal: false
