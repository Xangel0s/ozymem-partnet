# Coolify Docker Compose (for reference)
# Server uses Dockerfile build in Coolify
# Memgraph + Lab run via docker run on the server

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozymem-server
    restart: always
    ports:
      - "5857:5857"
    environment:
      PORT: "5857"
      MEMGRAPH_URI: "memgraph:7687"
      MEMGRAPH_USER: ${MEMGRAPH_USER}
      MEMGRAPH_PASSWORD: ${MEMGRAPH_PASSWORD}
      MEMGRAPH_DATABASE: ${MEMGRAPH_DATABASE:-memgraph}
      OZYMEM_SERVER_MODE: "web"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5857/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
